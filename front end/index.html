<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ollama Chat</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #151922;
      --panel-2: #10141b;
      --text: #edf2f7;
      --muted: #8b95a7;
      --brand: #22c55e;
      --brand-2: #16a34a;
      --line: rgba(255, 255, 255, 0.08);
      --user: linear-gradient(135deg, #1d4ed8, #2563eb);
      --assistant: #1b2130;
      --warn: #f59e0b;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      max-width: 1100px;
      margin: 0 auto;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: rgba(10, 13, 19, 0.55);
      backdrop-filter: blur(12px);
    }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(21, 25, 34, 0.92);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand h1 { margin: 0; font-size: 1.05rem; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 0.85rem; }
    .controls { display: flex; gap: 10px; align-items: center; }
    select, button, textarea, input { font: inherit; }
    select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 200px;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease, opacity 0.2s ease;
      color: #fff;
      background: var(--brand);
    }
    .btn:hover { background: var(--brand-2); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .chat { padding: 18px; overflow: hidden; }
    .chat-log {
      height: 62vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(16, 20, 27, 0.72);
    }
    .chat-empty {
      color: var(--muted);
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      line-height: 1.5;
    }
    .message {
      max-width: min(84%, 760px);
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      animation: rise 0.18s ease;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    @keyframes rise { from { transform: translateY(4px); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
    .message.user { align-self: flex-end; background: var(--user); color: #fff; border-bottom-right-radius: 6px; }
    .message.assistant { align-self: flex-start; background: var(--assistant); border-bottom-left-radius: 6px; }
    .meta { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .composer-wrap { padding: 0 18px 18px; display: grid; gap: 10px; }
    .attach-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .attach-input {
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 8px 10px;
      color: var(--muted);
      width: 100%;
    }
    .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .file-pill {
      font-size: 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
    }
    .composer { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    textarea {
      width: 100%;
      min-height: 72px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
    }
    .send { min-width: 128px; height: 48px; border-radius: 16px; align-self: end; }
    .footerline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0 18px 12px;
    }
    .status.warn { color: var(--warn); }
    .status.error { color: var(--error); }
    @media (max-width: 740px) {
      .topbar { flex-direction: column; align-items: stretch; }
      .controls { flex-direction: column; align-items: stretch; }
      .composer { grid-template-columns: 1fr; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Ollama Chat</h1>
        <p>Adjunta imágenes o documentos para dar más contexto al modelo.</p>
      </div>
      <div class="controls">
        <select id="model" aria-label="Modelo"></select>
        <button id="newConversationBtn" class="btn" type="button">Nueva conversación</button>
      </div>
    </header>

    <section class="chat">
      <div id="chatLog" class="chat-log" aria-live="polite"></div>
    </section>

    <section class="footerline">
      <span id="status" class="status">Listo para conversar.</span>
      <span>Enter envía, Shift+Enter agrega salto de línea.</span>
    </section>

    <section class="composer-wrap">
      <div class="attach-row">
        <input id="attachments" class="attach-input" type="file" multiple accept="image/*,.png,.jpg,.jpeg,.webp,.txt,.md,.json,.csv,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
      </div>
      <div id="fileList" class="file-list"></div>
      <div class="composer">
        <textarea id="prompt" placeholder="Escribe tu mensaje..."></textarea>
        <button id="askBtn" class="btn send" type="button">Enviar</button>
      </div>
    </section>
  </main>

  <script>
    const modelSelect = document.getElementById("model");
    const promptInput = document.getElementById("prompt");
    const askBtn = document.getElementById("askBtn");
    const newConversationBtn = document.getElementById("newConversationBtn");
    const statusEl = document.getElementById("status");
    const chatLogEl = document.getElementById("chatLog");
    const attachmentsInput = document.getElementById("attachments");
    const fileListEl = document.getElementById("fileList");
    let selectedFiles = [];

    const apiBaseUrl = window.location.origin;
    const defaultModel = "llama3:8b";
    const conversationKey = "ollama_proxy_conversation_id";
    const historyPrefix = "ollama_proxy_history_";

    const escapeHtml = (text) => String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");

    const createConversationId = () => (window.crypto?.randomUUID ? window.crypto.randomUUID() : `conv-${Date.now()}-${Math.random().toString(16).slice(2)}`);
    const getConversationId = () => localStorage.getItem(conversationKey) || createConversationId();
    const getHistoryKey = (conversationId) => `${historyPrefix}${conversationId}`;
    const loadHistory = (conversationId) => {
      try {
        return JSON.parse(localStorage.getItem(getHistoryKey(conversationId)) || "[]");
      } catch {
        return [];
      }
    };
    const saveHistory = (conversationId, history) => {
      localStorage.setItem(getHistoryKey(conversationId), JSON.stringify(history));
    };
    const appendToHistory = (conversationId, message) => {
      const history = loadHistory(conversationId);
      history.push(message);
      saveHistory(conversationId, history);
      return history;
    };

    const renderHistory = (conversationId) => {
      const history = loadHistory(conversationId);
      if (!history.length) {
        chatLogEl.innerHTML = '<div class="chat-empty">Empieza una conversación y verás aquí todo lo que escribes, lo que adjuntas y lo que responde la IA.</div>';
        return;
      }
      chatLogEl.innerHTML = history.map((message) => {
        const role = message.role === "assistant" ? "assistant" : "user";
        const label = role === "assistant" ? "IA" : "Tú";
        return `<div class="message ${role}"><div class="meta">${label}</div><div>${escapeHtml(message.content)}</div></div>`;
      }).join("");
      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    };

    const setStatus = (text, cssClass = "") => {
      statusEl.textContent = text;
      statusEl.className = cssClass ? `status ${cssClass}` : "status";
    };

    const renderSelectedFiles = () => {
      if (!selectedFiles.length) {
        fileListEl.innerHTML = '<span class="file-pill">Sin archivos adjuntos</span>';
        return;
      }
      fileListEl.innerHTML = selectedFiles.map((file) => `<span class="file-pill">${escapeHtml(file.name)}</span>`).join("");
    };

    const populateModels = async () => {
      try {
        const response = await fetch(`${apiBaseUrl}/models`);
        const data = await response.json();
        const models = Array.isArray(data.models) ? data.models : [];
        const options = [defaultModel, ...models.filter((model) => model !== defaultModel)];
        modelSelect.innerHTML = options.map((model) => `<option value="${escapeHtml(model)}">${escapeHtml(model)}</option>`).join("");
        const storedModel = localStorage.getItem("ollama_proxy_model") || defaultModel;
        modelSelect.value = options.includes(storedModel) ? storedModel : defaultModel;
      } catch {
        modelSelect.innerHTML = `<option value="${defaultModel}">${defaultModel}</option>`;
        modelSelect.value = defaultModel;
      }
    };

    const sendWithAttachments = async (conversationId, prompt, model, history, files) => {
      const form = new FormData();
      form.append("prompt", prompt);
      form.append("model", model);
      form.append("conversation_id", conversationId);
      form.append("messages_json", JSON.stringify(history));
      for (const file of files) {
        form.append("files", file);
      }

      const response = await fetch(`${apiBaseUrl}/chat/attachments`, {
        method: "POST",
        body: form,
      });
      return response;
    };

    const sendWithoutAttachments = async (conversationId, prompt, model, history) => {
      const response = await fetch(`${apiBaseUrl}/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          model,
          conversation_id: conversationId,
          messages: [...history, { role: "user", content: prompt }],
          stream: false,
        }),
      });
      return response;
    };

    const sendMessage = async () => {
      const conversationId = getConversationId();
      const prompt = promptInput.value.trim();
      const model = modelSelect.value || defaultModel;
      const files = [...selectedFiles];

      if (!prompt) {
        setStatus("Escribe un mensaje antes de enviar.", "warn");
        return;
      }

      localStorage.setItem(conversationKey, conversationId);
      localStorage.setItem("ollama_proxy_model", model);

      const currentHistory = loadHistory(conversationId);
  const filesCaption = files.length ? `\n\n[Adjuntos: ${files.map((f) => f.name).join(", ")}]` : "";
      appendToHistory(conversationId, { role: "user", content: prompt + filesCaption });
      appendToHistory(conversationId, { role: "assistant", content: "Escribiendo..." });
      renderHistory(conversationId);

      askBtn.disabled = true;
      promptInput.disabled = true;
      attachmentsInput.disabled = true;
      setStatus("Ollama está respondiendo...");

      try {
        const response = files.length
          ? await sendWithAttachments(conversationId, prompt, model, currentHistory, files)
          : await sendWithoutAttachments(conversationId, prompt, model, currentHistory);

        const data = await response.json();
        if (!response.ok) {
          throw new Error(typeof data?.detail === "string" ? data.detail : JSON.stringify(data));
        }

        const assistantText = data?.data?.message?.content || "(sin respuesta)";
        const history = loadHistory(conversationId).filter((m) => !(m.role === "assistant" && m.content === "Escribiendo..."));
        history.push({ role: "assistant", content: assistantText });
        saveHistory(conversationId, history);
        renderHistory(conversationId);
        selectedFiles = [];
        attachmentsInput.value = "";
        renderSelectedFiles();
        setStatus("Respuesta recibida.");
      } catch (error) {
        const history = loadHistory(conversationId).filter((m) => !(m.role === "assistant" && m.content === "Escribiendo..."));
        history.push({ role: "assistant", content: `Error: ${String(error.message || error)}` });
        saveHistory(conversationId, history);
        renderHistory(conversationId);
        setStatus("No se pudo consultar la API. Mantuve tus archivos para reintentar.", "error");
      } finally {
        askBtn.disabled = false;
        promptInput.disabled = false;
        attachmentsInput.disabled = false;
        promptInput.value = "";
        promptInput.focus();
      }
    };

    newConversationBtn.addEventListener("click", () => {
      const conversationId = createConversationId();
      localStorage.setItem(conversationKey, conversationId);
      renderHistory(conversationId);
      promptInput.value = "";
      selectedFiles = [];
      attachmentsInput.value = "";
      renderSelectedFiles();
      setStatus("Nueva conversación creada.");
    });

    attachmentsInput.addEventListener("change", () => {
      selectedFiles = Array.from(attachmentsInput.files || []);
      renderSelectedFiles();
      if (!selectedFiles.length) {
        setStatus("No se adjunto ningun archivo. En Firefox/Linux, prueba con PNG/JPG/PDF o arrastra el archivo.", "warn");
      } else {
        setStatus(`Adjuntos listos: ${selectedFiles.length}.`);
      }
    });
    askBtn.addEventListener("click", sendMessage);
    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    (async () => {
      localStorage.setItem(conversationKey, getConversationId());
      renderHistory(localStorage.getItem(conversationKey));
      renderSelectedFiles();
      await populateModels();
    })();
  </script>
</body>
</html>
